# ===============================
# Application Name
# ===============================
spring.application.name=PropSightAI

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/propsightai
spring.datasource.username=root
spring.datasource.password=a@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ===============================
# JPA / Hibernate Configuration
# ===============================
# Automatically creates tables based on entities if they do not exist
spring.jpa.hibernate.ddl-auto=update

# Show generated SQL queries in console
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# Multipart / File Upload Configuration
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# Timezone (avoid timestamp issues)
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# Server Configuration (optional)
# ===============================
server.port=8080


cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dec0rd7ta}
cloudinary.api-key=${CLOUDINARY_API_KEY:311363224553946}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:yuxI5HOHwn3-ERs2Gw2pe6Q6C_U}

# ===============================
# Security / JWT
# ===============================
# Set via environment variable JWT_SECRET or default to a placeholder (change in prod)
jwt.secret=${JWT_SECRET:realestateai_secure_jwt_secret_2026_prod_key_123456}

# mail sender configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend.url=http://localhost:5173