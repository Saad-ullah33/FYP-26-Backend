# ===============================
# Application Name
# ===============================
spring.application.name=PropSightAI

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/propsightai
spring.datasource.username=root
spring.datasource.password=a@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ===============================
# JPA / Hibernate Configuration
# ===============================
# Automatically creates tables based on entities if they do not exist
spring.jpa.hibernate.ddl-auto=update

# Show generated SQL queries in console
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# Multipart / File Upload Configuration
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# Timezone (avoid timestamp issues)
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# Server Configuration (optional)
# ===============================
server.port=8080


cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
